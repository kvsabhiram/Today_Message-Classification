name: Build & Deploy (GPU / EC2)

# CI/CD: build the GPU image (build job), then deploy onto the g5.xlarge EC2 box
# via SSM (deploy job). Split into two jobs so the GitHub UI shows distinct stages
# and deploy only runs if build succeeds.
on:
  push:
    branches: [main]
    paths:
      - "inference.py"
      - "requirements.txt"
      - "Dockerfile"
      - "output_v11/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

env:
  AWS_REGION: ap-south-1            # Mumbai
  ECR_REPO: todozee-classifier
  CONTAINER_NAME: todozee
  APP_PORT: 5011

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for AWS OIDC
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - name: Checkout (with LFS adapter weights)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure LFS objects are present
        run: git lfs pull

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPO" \
                 --image-scanning-configuration scanOnPush=true

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image_uri=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for AWS OIDC
    env:
      IMAGE_URI: ${{ needs.build.outputs.image_uri }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # Registry host is the part of the image URI before the first slash.
          REGISTRY="${IMAGE_URI%%/*}"
          # Build the SSM parameters as a JSON file to avoid shell-quoting pitfalls.
          cat > deploy-cmd.json <<EOF
          {
            "commands": [
              "set -e",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY}",
              "docker pull ${IMAGE_URI}",
              "docker rm -f ${CONTAINER_NAME} 2>/dev/null || true",
              "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped --gpus all -p ${APP_PORT}:${APP_PORT} ${IMAGE_URI}",
              "docker image prune -f"
            ]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy todozee ${{ github.sha }}" \
            --parameters file://deploy-cmd.json \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          # Poll to a terminal state ourselves: the built-in waiter caps at ~100s, but pulling the
          # multi-GB image routinely takes longer, and `|| true` would mask a still-running/failed
          # command -> the job would go green before the container was actually swapped. Wait up to
          # ~10 min and fail the job unless the command finished Successfully.
          STATUS=Pending
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}" --output json
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy SSM command did not succeed (status=$STATUS)"; exit 1
          fi

      - name: Health check
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > health-cmd.json <<EOF
          {
            "commands": [
              "for i in \$(seq 1 30); do curl -fsS http://localhost:${APP_PORT}/health && exit 0; sleep 10; done; echo UNHEALTHY; exit 1"
            ]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://health-cmd.json \
            --query "Command.CommandId" --output text)
          # The on-box script exits 0 only once /health returns healthy (up to ~5 min), else exits 1.
          # Poll to a terminal state and propagate it: a non-Success status here means the NEWLY
          # deployed container never became healthy, so the deploy must fail.
          STATUS=Pending
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Out:StandardOutputContent}" --output json
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Health check failed - deployed container did not become healthy (status=$STATUS)"; exit 1
          fi
